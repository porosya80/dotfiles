- clean: ['~']

- link:
    ~/.gitconfig:
        path: gitconfig
        create: true
        relink: false
        force: true
    ~/.vimrc:
        path: vimrc
        create: true
        relink: false
        force: true
    ~/.zshrc:
        path: zshrc
        create: true
        relink: false
        force: true
    ~/.tmux.conf:
        path: tmux.conf
        create: true
        relink: false
        force: true

- shell:
    [vim +PluginInstall +qall]
    


